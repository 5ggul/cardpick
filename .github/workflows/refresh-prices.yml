name: Refresh Card Prices

on:
  schedule:
    # 매시간 정각 (UTC 기준, KST는 +9시간)
    - cron: '0 * * * *'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write  # 자동 커밋 권한

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd scripts
          npm ci

      - name: Refresh eBay prices
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
        run: node scripts/refresh-prices.js

      - name: Refresh exchange rate
        run: node scripts/refresh-fx.js

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh prices [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
          fi
