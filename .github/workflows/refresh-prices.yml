name: Pokemon daily refresh + hot cards

# NANO tier IO 최적화 모드 (2026-06-01~):
# - 매일 cron이 IO budget(30분/일) 소진해 baseline 운영으로 전락
# - 변경: batch 감소 + 시간 분산 (1.5시간 집중 → 4.5시간 분산) + hot/cardmarket 빈도 감소
#
# 일일 INSERT 부하 비교:
#  이전: 1000 (TCG) + 168×500(CM 격일=84) + 800 (cold) + MV refresh 매일 = IO 폭발
#  변경: 600  (TCG) + CM 주2회                + 400 (cold) + MV refresh 격일 = IO 절반
#
# 트레이드오프: Trust 회복 살짝 느려짐, Cardmarket fresh 평균 1~3일 lag
on:
  schedule:
    - cron: '0 20 * * *'      # 05:00 KST TCGplayer 가격 (target 600장)
    - cron: '0 22 * * 1,5'    # 07:00 KST Cardmarket 평균 (주 2회: 월·금만)
    - cron: '40 20 */2 * *'   # 05:40 KST 핫카드 계산 (격일, 홀수일)
    - cron: '0 23 * * *'      # 08:00 KST Cold rotation (target 400장, 1시간 분산)
    - cron: '0 0 * * *'       # 09:00 KST Naver datalab trends
  workflow_dispatch:
    inputs:
      job:
        description: 'pokemon | cardmarket | hot | cold | trends | all'
        required: false
        default: 'all'

jobs:
  pokemon-prices:
    if: github.event.schedule == '0 20 * * *' || github.event.inputs.job == 'pokemon' || github.event.inputs.job == 'all' || github.event.inputs.job == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.POKEMON_TCG_API_KEY }}" ]; then
            echo "::error::POKEMON_TCG_API_KEY secret 미설정 — GitHub repo Settings → Secrets and variables → Actions 에서 등록"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret 미설정"
            exit 1
          fi
      - name: Pokemon TCG API refresh
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          POKEMON_DAILY_TARGET: '600'
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/refresh_pokemon_tcg_api.py

  cardmarket-refresh:
    if: github.event.schedule == '0 22 * * 1,5' || github.event.inputs.job == 'cardmarket' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.POKEMON_TCG_API_KEY }}" ] || [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::POKEMON_TCG_API_KEY 또는 SUPABASE_DB_PASSWORD 미설정"
            exit 1
          fi
      - name: Cardmarket avg7/14/30 refresh (172 sets, normalized name match)
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/refresh_cardmarket.py

  hot-cards:
    # 독립 실행 — needs 제거 (각 cron schedule에서 단독 트리거)
    # 격일 실행 (홀수일) — Cardmarket이 주 2회로 줄어 hot 매일 갱신 의미 작음
    if: github.event.schedule == '40 20 */2 * *' || github.event.inputs.job == 'hot' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD 미설정"
            exit 1
          fi
      - name: Compute hot cards
        env:
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/compute_hot_cards.py

  seed-board:
    # 수동 트리거 — 게시판 시드 글/댓글 INSERT
    if: github.event.inputs.job == 'seed-board'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Seed board QnA post + comments (batch 1)
        env:
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/seed_board_qna.py
      - name: Seed board batch 2 (6 posts + comments)
        env:
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/seed_board_batch2.py
      - name: Seed board batch 3 (2 recent posts for home widget)
        env:
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/seed_board_batch3.py
      - name: Seed board batch 4 (직구 관세 / 입문 첫 박스)
        env:
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/seed_board_batch4.py

  cold-rotation:
    # 매일 08:00 KST — 신규 카드 발견 + 가격 없거나 14일+ stale 카드 LRU 갱신
    # target 400장 (이전 800) — NANO tier IO 최적화. 전체 카탈로그 1바퀴 ≈ 2주
    if: github.event.schedule == '0 23 * * *' || github.event.inputs.job == 'cold' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.POKEMON_TCG_API_KEY }}" ] || [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::POKEMON_TCG_API_KEY 또는 SUPABASE_DB_PASSWORD 미설정"
            exit 1
          fi
      - name: Discover new cards + cold rotation refresh
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          COLD_DAILY_TARGET: '400'
          COLD_STALE_DAYS: '14'
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/refresh_cold_pokemon.py

  diag-match:
    # [임시 진단] cold rotation 매칭 실패 원인 (읽기 전용). job=diag 로만 실행
    if: github.event.inputs.job == 'diag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Diagnose match failures (read-only)
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/diag_match.py

  trends-naver:
    # 매일 09:00 KST — 네이버 데이터랩 검색어 트렌드 (30 키워드)
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.job == 'trends' || github.event.inputs.job == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install psycopg2-binary
      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.NAVER_CLIENT_ID }}" ] || [ -z "${{ secrets.NAVER_CLIENT_SECRET }}" ]; then
            echo "::error::NAVER_CLIENT_ID / NAVER_CLIENT_SECRET 미설정"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD 미설정"
            exit 1
          fi
      - name: Fetch Naver Datalab trends
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_DB_HOST: aws-1-ap-northeast-2.pooler.supabase.com
          SUPABASE_DB_USER: postgres.aqxrmdratnkffvivguqs
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/fetch_naver_trends.py
