name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cloudflare secrets
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN 또는 CLOUDFLARE_ACCOUNT_ID 미설정"
            echo "skip=1" >> $GITHUB_OUTPUT
          else
            echo "skip=0" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Cloudflare Pages
        if: steps.check.outputs.skip != '1'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # commit-message ASCII-only로 명시 (Cloudflare API code 8000111 — Korean reject 회피)
          # commit-hash로 실제 commit 추적 가능
          command: pages deploy . --project-name=cardpick --branch=main --commit-dirty=true --commit-message="GitHub Actions deploy ${{ github.sha }}" --commit-hash="${{ github.sha }}"
