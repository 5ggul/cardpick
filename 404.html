<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>페이지를 찾을 수 없습니다 — 카드픽</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root{--bg:#05080D;--fg:#E8EDF5;--sub:#8B96A8;--up:#26E0C2;--line:rgba(255,255,255,0.08);--mono:"IBM Plex Mono",ui-monospace,monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg);font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
  .mark{width:52px;height:52px;display:block;object-fit:contain;margin-bottom:32px;flex:none}
  .code{font-family:var(--mono);font-size:13px;color:var(--up);letter-spacing:.14em;margin-bottom:10px}
  h1{font-size:36px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
  p{color:var(--sub);font-size:15px;line-height:1.6;max-width:480px;margin-bottom:32px}
  .links{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .links a{padding:10px 18px;border:1px solid var(--line);color:var(--fg);text-decoration:none;font-size:13px;border-radius:2px;transition:border-color .15s,color .15s}
  .links a:hover{border-color:var(--up);color:var(--up)}
  .links a.primary{background:var(--up);color:#04100E;border-color:var(--up);font-weight:600}
  .links a.primary:hover{opacity:.88;color:#04100E}
  .meta{margin-top:48px;font-family:var(--mono);font-size:11px;color:var(--sub);letter-spacing:.06em}
</style>
</head>
<body>
  <img src="/logo.png?v=2" alt="카드픽" class="mark" width="52" height="52" style="display:block;margin-bottom:32px">
  <div class="code">ERROR 404</div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 페이지가 이동되었거나 존재하지 않습니다. URL을 다시 확인하시거나 아래에서 주요 페이지로 이동하세요.</p>
  <div class="links">
    <a href="/" class="primary">홈으로</a>
    <a href="/#prices">가격</a>
    <a href="/releases">발매정보</a>
    <a href="/board">게시판</a>
    <a href="/tools">도구</a>
  </div>
  <div class="meta">CARDPICK · cardpick.kr</div>
</body>
</html>
