<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">

<style>
  :root{
    --cp-bg:#05080D; --cp-panel:#0D121B; --cp-panel-2:#111722;
    --cp-line:rgba(255,255,255,0.08); --cp-line-strong:rgba(255,255,255,0.14);
    --cp-fg:#E8EDF5; --cp-sub:#8B96A8; --cp-dim:#5B6577;
    --cp-up:#26E0C2; --cp-down:#FF4D6D; --cp-gold:#D8B84A;
    --cp-mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cp-bg);color:var(--cp-fg);font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{font-size:14px;line-height:1.5;min-height:100vh}
  a{color:inherit;text-decoration:none}
  a:hover{color:#fff}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  .mono{font-family:var(--cp-mono);font-variant-numeric:tabular-nums}
  .cp-shell{max-width:880px;margin:0 auto;padding:0 20px}

  .cp-topbar{position:sticky;top:0;z-index:50;background:#05080D;border-bottom:1px solid var(--cp-line)}
  .cp-topbar-inner{display:flex;align-items:center;gap:24px;height:56px}
  .cp-brand{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--cp-fg)}
  .cp-brand .cp-mark{width:28px;height:28px;display:block;object-fit:contain;flex:none}
  .cp-brand .cp-name{font-size:15px}
  .cp-brand .cp-en{color:var(--cp-sub);font-family:var(--cp-mono);font-size:11px;letter-spacing:.12em}
  .cp-nav{display:flex;gap:2px;flex:1;margin-left:8px}
  .cp-nav a{padding:8px 12px;font-size:13.5px;color:var(--cp-sub);border-radius:3px}
  .cp-nav a:hover{color:var(--cp-fg);background:rgba(255,255,255,0.04)}
  .cp-login-google{display:inline-flex;align-items:center;justify-content:center;gap:9px;height:36px;padding:0 13px;border:1px solid var(--cp-line-strong);border-radius:1px;background:#080D15;color:var(--cp-fg);font-size:12.5px;font-weight:600;cursor:pointer;flex:none;white-space:nowrap}
  .cp-login-google:hover{border-color:rgba(255,255,255,0.28);background:#0D1420;color:#fff}
  .cp-login-google svg{width:16px;height:16px}

  /* 모바일 헤더 (board/tools 페이지와 동일) */
  @media (max-width:980px){
    .cp-topbar-inner{flex-wrap:wrap;height:auto;min-height:56px;padding:8px 0;gap:8px}
    .cp-nav{display:flex!important;order:99;flex-basis:100%;overflow-x:auto;scrollbar-width:none;padding:8px 0 4px;gap:0;margin-top:6px;margin-left:0;border-top:1px solid var(--cp-line)}
    .cp-nav::-webkit-scrollbar{display:none}
    .cp-nav a{padding:8px 12px;font-size:13px;white-space:nowrap;flex-shrink:0}
  }

  main{padding:40px 0 80px}
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
  .sub{color:var(--cp-sub);font-size:13.5px;margin-bottom:32px}

  .card{background:var(--cp-panel);border:1px solid var(--cp-line);border-radius:4px;padding:24px;margin-bottom:20px}
  .card h2{font-size:13px;font-family:var(--cp-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--cp-sub);margin-bottom:18px;font-weight:600}

  .profile-row{display:flex;align-items:center;gap:20px;margin-bottom:24px}
  .avatar{width:64px;height:64px;border-radius:50%;border:1px solid var(--cp-line-strong);background:var(--cp-up);color:#04100E;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;overflow:hidden;flex:none}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .profile-meta .name{font-size:20px;font-weight:700;color:var(--cp-fg);margin-bottom:4px}
  .profile-meta .email{font-size:13px;color:var(--cp-sub);font-family:var(--cp-mono)}

  dl.info{display:grid;grid-template-columns:140px 1fr;gap:14px 20px}
  dl.info dt{color:var(--cp-sub);font-family:var(--cp-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding-top:2px}
  dl.info dd{color:var(--cp-fg);font-size:14px;word-break:break-all}

  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--cp-line-strong);border-radius:2px;background:#080D15;color:var(--cp-fg);font-size:13px;cursor:pointer;text-decoration:none}
  .btn:hover{border-color:var(--cp-up);color:var(--cp-up)}
  .btn-danger:hover{border-color:var(--cp-down);color:var(--cp-down)}
  .btn-primary{background:var(--cp-up);color:#04100E;border-color:var(--cp-up);font-weight:600}
  .btn-primary:hover{opacity:.88;color:#04100E}

  .empty{text-align:center;padding:60px 20px}
  .empty h1{margin-bottom:10px}
  .empty p{color:var(--cp-sub);margin-bottom:24px}

  /* 관심 카드 / 내 글 리스트 */
  .cp-list{display:flex;flex-direction:column;border-top:1px solid var(--cp-line)}
  .cp-list-item{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:1px solid var(--cp-line);text-decoration:none;color:inherit;transition:background .15s}
  .cp-list-item:hover{background:rgba(255,255,255,0.02)}
  .cp-list-item .strip{width:3px;align-self:stretch;background:#26E0C2;border-radius:2px;flex:none}
  .cp-list-item .strip.poke{background:linear-gradient(180deg,#D8B84A,#8C6F1F)}
  .cp-list-item .strip.op{background:linear-gradient(180deg,#FF4D6D,#7A2030)}
  .cp-list-item .meta{flex:1;min-width:0}
  .cp-list-item .name{font-size:14px;font-weight:600;color:var(--cp-fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cp-list-item .sub2{font-size:11.5px;color:var(--cp-sub);font-family:var(--cp-mono);letter-spacing:.04em;margin-top:2px}
  .cp-list-item .date{font-size:11px;color:var(--cp-sub);font-family:var(--cp-mono);flex:none}
  .cp-list-item .remove{font-size:11px;color:var(--cp-sub);padding:6px 10px;border:1px solid var(--cp-line);border-radius:2px;background:transparent;flex:none;cursor:pointer;transition:all .15s}
  .cp-list-item .remove:hover{color:var(--cp-down);border-color:rgba(255,77,109,0.45)}
  .cp-empty-mini{padding:28px 4px;text-align:center;color:var(--cp-sub);font-size:13px}
  .cp-empty-mini a{color:var(--cp-up);border-bottom:1px dashed rgba(38,224,194,0.4)}
  .cp-section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .cp-section-head h2{margin-bottom:0}
  .cp-section-head .count{font-size:11px;color:var(--cp-sub);font-family:var(--cp-mono)}

  .skeleton{background:linear-gradient(90deg,#0D121B 25%,#111722 50%,#0D121B 75%);background-size:200% 100%;animation:sk 1.4s linear infinite;border-radius:2px;color:transparent;user-select:none}
  @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

  footer{margin-top:48px;padding:24px 0;border-top:1px solid var(--cp-line);color:var(--cp-sub);font-size:12px;text-align:center}
</style>

</head>
<body>

<header class="cp-topbar">
  <div class="cp-shell cp-topbar-inner">
    <a href="/" class="cp-brand">
      <img src="/logo.png?v=2" alt="카드픽" class="cp-mark" width="28" height="28">
      <span class="cp-name">카드픽</span>
      <span class="cp-en">CARDPICK</span>
    </a>
    <nav class="cp-nav">
      <a href="/#prices">가격</a>
      <a href="/releases">발매정보</a>
      <a href="/board">게시판</a>
    </nav>
    <button type="button" class="cp-login-google" data-cp-login>
      <svg viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.84.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.94v2.33A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.95 10.71A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.71V4.96H.94A9 9 0 0 0 0 9c0 1.45.35 2.82.94 4.04l3.01-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.43 1.35l2.58-2.58C13.46.9 11.42 0 9 0A9 9 0 0 0 .94 4.96l3.01 2.33C4.66 5.16 6.65 3.58 9 3.58z"/>
      </svg>
      <span>Google로 로그인</span>
    </button>
  </div>
</header>

<main>
  <div class="cp-shell">
    <!-- 로딩 / 비로그인 -->
    <div id="state-anon" class="empty" hidden>
      <h1>로그인이 필요합니다</h1>
      <p>내 정보, 관심 카드, 작성 글을 확인하려면 Google 계정으로 로그인하세요.</p>
      <button type="button" class="btn btn-primary" onclick="window.cardpickAuth && window.cardpickAuth.signIn()">Google로 로그인</button>
    </div>

    <div id="state-loading">
      <h1 class="skeleton">로딩 중</h1>
      <div class="sub skeleton">정보 가져오는 중</div>
      <div class="card">
        <div class="profile-row">
          <div class="avatar skeleton"></div>
          <div class="profile-meta" style="flex:1">
            <div class="name skeleton" style="width:60%">이름</div>
            <div class="email skeleton" style="width:80%;margin-top:6px">email@example.com</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 로그인 -->
    <div id="state-user" hidden>
      <h1>내 정보</h1>
      <p class="sub">카드픽 계정 정보 · Google 연동</p>

      <div class="card">
        <h2>프로필</h2>
        <div class="profile-row">
          <div class="avatar" id="my-avatar"></div>
          <div class="profile-meta">
            <div class="name" id="my-name"></div>
            <div class="email" id="my-email"></div>
          </div>
        </div>
        <dl class="info">
          <dt>가입일</dt>
          <dd id="my-created"></dd>
          <dt>마지막 로그인</dt>
          <dd id="my-lastsignin"></dd>
          <dt>인증 제공자</dt>
          <dd>Google</dd>
          <dt>사용자 ID</dt>
          <dd id="my-uid" class="mono" style="font-size:11px;color:var(--cp-sub)"></dd>
        </dl>
      </div>

      <div class="card" id="watchlist">
        <div class="cp-section-head">
          <h2>관심 카드</h2>
          <span class="count mono" id="wl-count">—</span>
        </div>
        <div id="wl-body">
          <div class="cp-empty-mini">불러오는 중...</div>
        </div>
      </div>

      <div class="card" id="alerts">
        <div class="cp-section-head">
          <h2>가격 알림 구독</h2>
          <span class="count mono" id="al-count">—</span>
        </div>
        <div id="al-body">
          <div class="cp-empty-mini">불러오는 중...</div>
        </div>
      </div>

      <div class="card" id="posts">
        <div class="cp-section-head">
          <h2>내 글</h2>
          <span class="count mono" id="po-count">—</span>
        </div>
        <div id="po-body">
          <div class="cp-empty-mini">불러오는 중...</div>
        </div>
      </div>

      <div class="card">
        <h2>계정</h2>
        <div class="actions">
          <a href="/" class="btn">홈으로</a>
          <a href="/board" class="btn">게시판</a>
          <button type="button" class="btn btn-danger" id="btn-signout">로그아웃</button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>© 2026 CARDPICK · cardpick.kr</footer>

<script src="/auth.js?v=v3clean"></script>
  <script src="/search.js?v=20260519ko"></script>
<script>
function fmtKstDate(iso){
  if(!iso) return '—';
  try{
    const d = new Date(iso);
    return d.toLocaleString('ko-KR', { timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }catch(e){ return iso; }
}

function renderMy(user){
  const loading = document.getElementById('state-loading');
  const anon = document.getElementById('state-anon');
  const card = document.getElementById('state-user');
  if(!user){
    loading.hidden = true; anon.hidden = false; card.hidden = true;
    return;
  }
  loading.hidden = true; anon.hidden = true; card.hidden = false;
  const meta = user.user_metadata || {};
  const name = meta.name || meta.full_name || (user.email ? user.email.split('@')[0] : '사용자');
  const av = document.getElementById('my-avatar');
  if(meta.avatar_url){ av.innerHTML = `<img src="${meta.avatar_url}" alt="">`; }
  else{ av.textContent = name.charAt(0).toUpperCase(); }
  document.getElementById('my-name').textContent = name;
  document.getElementById('my-email').textContent = user.email || '—';
  document.getElementById('my-created').textContent = fmtKstDate(user.created_at);
  document.getElementById('my-lastsignin').textContent = fmtKstDate(user.last_sign_in_at);
  document.getElementById('my-uid').textContent = user.id || '—';
  // 활동 데이터 로드
  loadActivity();
}

function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function gameStripClass(g){ if(g==='pokemon') return 'poke'; return ''; }
function relDate(iso){
  if(!iso) return '';
  const d = new Date(iso); const now = Date.now();
  const diff = Math.floor((now - d.getTime())/1000);
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  if (diff < 86400*7) return Math.floor(diff/86400) + '일 전';
  return d.toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'});
}

async function loadActivity(){
  const auth = window.cardpickAuth;
  if (!auth) return;
  const c = auth.getClient();
  const { data:{ user: currentUser } } = await c.auth.getUser();
  if (!currentUser) return;
  // 관심 카드
  const wl = await auth.getWatchlist();
  document.getElementById('wl-count').textContent = wl.length + '개';
  const wlBody = document.getElementById('wl-body');
  if (!wl.length){
    wlBody.innerHTML = '<div class="cp-empty-mini">담은 관심 카드가 없습니다. <a href="/#prices">가격에서 카드 둘러보기</a></div>';
  } else {
    wlBody.innerHTML = '<div class="cp-list">' + wl.slice(0,20).map(it => `
      <a href="/cards/${encodeURIComponent(it.card_slug)}" class="cp-list-item" data-slug="${escapeHtml(it.card_slug)}">
        <span class="strip ${gameStripClass(it.game)}"></span>
        <div class="meta">
          <div class="name">${escapeHtml(it.card_name || it.card_slug)}</div>
          <div class="sub2">${escapeHtml(it.card_set || '—')} · ${escapeHtml((it.game||'').toUpperCase())}</div>
        </div>
        <span class="date">${relDate(it.created_at)}</span>
        <button type="button" class="remove" data-remove="${escapeHtml(it.card_slug)}" aria-label="삭제">해제</button>
      </a>
    `).join('') + '</div>';
    wlBody.querySelectorAll('[data-remove]').forEach(btn => {
      btn.onclick = async (e) => {
        e.preventDefault(); e.stopPropagation();
        const slug = btn.getAttribute('data-remove');
        if (!confirm('관심 카드에서 제외할까요?')) return;
        await auth.removeWatch(slug);
        loadActivity();
      };
    });
  }
  // 알림
  const { data: alerts } = await c.from('price_alerts').select('*').eq('user_id', currentUser.id).order('created_at',{ascending:false}).limit(20);
  document.getElementById('al-count').textContent = (alerts ? alerts.length : 0) + '개';
  const alBody = document.getElementById('al-body');
  if (!alerts || !alerts.length){
    alBody.innerHTML = '<div class="cp-empty-mini">구독 중인 가격 알림이 없습니다. 카드 페이지에서 시계 아이콘으로 추가하세요.</div>';
  } else {
    alBody.innerHTML = '<div class="cp-list">' + alerts.map(a => `
      <a href="/cards/${encodeURIComponent(a.card_slug)}" class="cp-list-item">
        <span class="strip"></span>
        <div class="meta">
          <div class="name">${escapeHtml(a.card_name || a.card_slug)}</div>
          <div class="sub2">±${a.threshold_pct}% 변동 시 · ${a.active ? '구독 중' : '일시정지'}</div>
        </div>
        <span class="date">${relDate(a.created_at)}</span>
      </a>
    `).join('') + '</div>';
  }
  // 내 글 — ★ user_id 필터 의무 (로그인한 사용자가 직접 작성한 글만)
  const { data: posts } = await c.from('posts')
    .select('id,board,title,created_at,comments_count,likes')
    .eq('user_id', currentUser.id)
    .order('created_at',{ascending:false})
    .limit(20);
  document.getElementById('po-count').textContent = (posts ? posts.length : 0) + '개';
  const poBody = document.getElementById('po-body');
  if (!posts || !posts.length){
    poBody.innerHTML = '<div class="cp-empty-mini">작성한 글이 없습니다. <a href="/board">게시판에서 첫 글 쓰기</a></div>';
  } else {
    poBody.innerHTML = '<div class="cp-list">' + posts.map(p => `
      <a href="/board?post=${p.id}" class="cp-list-item">
        <span class="strip"></span>
        <div class="meta">
          <div class="name">${escapeHtml(p.title)}</div>
          <div class="sub2">${escapeHtml(p.board.toUpperCase())} · 댓글 ${p.comments_count} · ♥ ${p.likes}</div>
        </div>
        <span class="date">${relDate(p.created_at)}</span>
      </a>
    `).join('') + '</div>';
  }
}

(function waitAuth(){
  if(window.cardpickAuth){
    const c = window.cardpickAuth.getClient();
    if(c){
      c.auth.getSession().then(({data:{session}})=> renderMy(session?.user || null));
      c.auth.onAuthStateChange((evt, sess)=> {
        renderMy(sess?.user || null);
        // OAuth 콜백으로 SIGNED_IN 발생 시 URL의 ?code= / #access_token 제거 + 홈으로 이동
        if (evt === 'SIGNED_IN' && (location.search.includes('code=') || location.hash.includes('access_token'))) {
          history.replaceState(null, '', '/my');
          // /my에 머물지 않고 홈으로 이동
          setTimeout(() => { location.replace('/'); }, 100);
        }
      });
      document.getElementById('btn-signout').onclick = ()=> {
        if(confirm('로그아웃 하시겠습니까?')) window.cardpickAuth.signOut();
      };
      return;
    }
  }
  setTimeout(waitAuth, 300);
})();
</script>
</body>
